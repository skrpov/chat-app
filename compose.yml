services:
  redis:
    image: redis:latest
    container_name: redis-server
    command: redis-server --requirepass ${REDIS_PASSWORD}
    restart: always
    volumes:
      - redis_data:/data

  django-web:
    build: .
    container_name: django-docker
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - DEBUG=${DEBUG}
      - SECRET_KEY=${SECRET_KEY}
      - FERNET_KEY=${FERNET_KEY}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - .:/app
      - sqlite_data:/app/data/

volumes:
  redis_data:
  sqlite_data: