services:
  redis:
    image: redis:latest
    container_name: redis-server
    command: redis-server --requirepass ${REDIS_PASSWORD}
    restart: always
    volumes:
      - redis_data:/data

  django-web:
    build: .
    container_name: carrier-pigeon
    ports:
      - "8000:8000"
    environment:
      - DEBUG=${DEBUG}
      - SECRET_KEY=${SECRET_KEY}
      - FERNET_KEY=${FERNET_KEY}
      - CHANNEL_LAYER_BACKEND=${CHANNEL_LAYER_BACKEND:-memory}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-}
    volumes:
      - .:/app
      - sqlite_data:/app/data/

volumes:
  redis_data:
  sqlite_data: