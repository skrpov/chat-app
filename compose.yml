services:
  redis:
    image: redis:latest
    container_name: redis-server
    ports:
      - "6379:6379"
    restart: always
    volumes:
      - redis_data:/data

  django-web:
    build: .
    container_name: django-docker
    ports:
      - "8000:8000"
    depends_on:
      - redis
    volumes:
      - .:/app 
      - sqlite_data:/app/data/

volumes:
  redis_data:
  sqlite_data: