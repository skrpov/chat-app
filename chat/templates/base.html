<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
    />
    <title>{% block title %}Messenger{% endblock %}</title>
  </head>
  <body class="bg-light">
    <div
      id="error-banner"
      style="
        display: none;
        position: fixed;
        bottom: 1.5rem;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        white-space: nowrap;
      "
      class="px-3 py-2 rounded bg-danger text-white small shadow"
    ></div>
    {% block content %}{% endblock %}
    {% block scripts %}{% endblock %}
  </body>
</html>
