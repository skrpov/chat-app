<form hx-post="{% url 'create_room' %}" hx-target="this" hx-swap="outerHTML">
  {% csrf_token %}
  <div class="mb-3">
    <label for="create-room-name" class="form-label">Room name</label>
    <input
      type="text"
      name="name"
      id="create-room-name"
      class="form-control{% if errors.name %} is-invalid{% endif %}"
      placeholder="e.g. General"
      value="{{ values.name|default:'' }}"
      maxlength="255"
      autocomplete="off"
    />
    {% if errors.name %}<div class="invalid-feedback">{{ errors.name }}</div>{% endif %}
  </div>
  <div class="mb-3">
    <label for="create-room-id" class="form-label">Room ID</label>
    <input
      type="text"
      name="room_id"
      id="create-room-id"
      class="form-control{% if errors.room_id %} is-invalid{% endif %}"
      placeholder="e.g. general"
      value="{{ values.room_id|default:'' }}"
      maxlength="255"
      autocomplete="off"
    />
    {% if errors.room_id %}
      <div class="invalid-feedback">{{ errors.room_id }}</div>
    {% else %}
      <div class="form-text">A shareable ID others use to join this room.</div>
    {% endif %}
  </div>
  <div class="mb-3">
    <label class="form-label">Visibility</label>
    <div class="d-flex gap-3">
      <div class="form-check">
        <input class="form-check-input" type="radio" name="visibility" value="public"
               id="create-vis-public" {% if values.visibility == 'public' %}checked{% endif %}>
        <label class="form-check-label" for="create-vis-public">Public</label>
      </div>
      <div class="form-check">
        <input class="form-check-input" type="radio" name="visibility" value="private"
               id="create-vis-private" {% if values.visibility == 'private' %}checked{% endif %}>
        <label class="form-check-label" for="create-vis-private">Private</label>
      </div>
    </div>
    {% if errors.visibility %}
      <div class="text-danger small mt-1">{{ errors.visibility }}</div>
    {% endif %}
  </div>
  <button type="submit" class="btn btn-primary w-100">Create room</button>
</form>
