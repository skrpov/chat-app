<div class="modal fade" id="roomSettingsModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title fw-semibold">Room settings</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body"
           hx-get="{% url 'room_settings' room_id=room.id %}"
           hx-trigger="show.bs.modal from:#roomSettingsModal"
           hx-swap="innerHTML">
        <div class="text-center py-3">
          <div class="spinner-border spinner-border-sm text-secondary" role="status"></div>
        </div>
      </div>
    </div>
  </div>
</div>
