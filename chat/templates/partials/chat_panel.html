{% load static %}
<div class="flex-grow-1 d-flex flex-column gap-2" style="min-width: 0;">
  <div class="card flex-grow-1 d-flex flex-column" style="min-height: 0;">
    <div class="card-header fw-semibold d-flex align-items-center justify-content-between" style="height: 3rem;">
      <span>{{ room.name }} </span>

      {% if user == room.owner %}
        <button class="btn btn-sm btn-outline-secondary"
                data-bs-toggle="modal" data-bs-target="#roomSettingsModal"
                title="Room settings">
          <i class="fa-solid fa-gear"></i> Room settings
        </button>
      {% endif %}

    </div>
    <div class="card-body overflow-y-auto" id="messages"></div>
  </div>
  <div class="input-group" style="height: 3rem;">
    <input
      id="message-input"
      type="text"
      class="form-control"
      placeholder="Type a message…"
    />
    <button id="send-button" class="btn btn-primary px-3" title="Send">
      <i class="fa-solid fa-paper-plane"></i>
    </button>
  </div>
</div>
{{ room.id|json_script:"room-id-data" }}
<script src="{% static 'message_feed.js' %}"></script>
<script src="{% static 'chat_panel.js' %}"></script>
<script>
  window.onload = () => initChatPanel(
    JSON.parse(document.getElementById('room-id-data').textContent),
    "{{ user.username }}"
  );
</script>
