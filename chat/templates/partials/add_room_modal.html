<div class="modal fade" id="addRoomModal" tabindex="-1" aria-labelledby="addRoomModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title fw-semibold" id="addRoomModalLabel">Add a room</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <ul class="nav nav-pills nav-fill mb-3" id="addRoomTab" role="tablist">
          <li class="nav-item" role="presentation">
            <button class="nav-link active" id="join-tab" data-bs-toggle="pill" data-bs-target="#join-pane" type="button" role="tab" aria-controls="join-pane" aria-selected="false">
              <i class="fa-solid fa-right-to-bracket me-1"></i> Join
            </button>
          </li>

          <li class="nav-item" role="presentation">
            <button class="nav-link" id="create-tab" data-bs-toggle="pill" data-bs-target="#create-pane" type="button" role="tab" aria-controls="create-pane" aria-selected="true">
              <i class="fa-solid fa-plus me-1"></i> Create
            </button>
          </li>
        </ul>

        <div class="tab-content" id="addRoomTabContent">
          <div class="tab-pane fade" id="create-pane" role="tabpanel" aria-labelledby="create-tab">
            {% include "partials/create_room_form.html" %}
          </div>
          <div class="tab-pane fade show active" id="join-pane" role="tabpanel" aria-labelledby="join-tab">
            {% include "partials/join_room_form.html" %}
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
