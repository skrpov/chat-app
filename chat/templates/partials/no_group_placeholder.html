<div class="flex-grow-1 d-flex flex-column gap-2" style="min-width: 0;">
  <div class="card flex-grow-1 d-flex flex-column" style="min-height: 0;">
    <div class="card-header fw-semibold d-flex align-items-center gap-2" style="height: 3rem;">
      <button id="sidebar-toggle" type="button" class="btn btn-sm border-0 btn-outline-secondary d-md-none" title="Rooms">
        <i class="fa-solid fa-bars"></i>
      </button>
    </div>
    <div class="card-body d-flex flex-column align-items-center justify-content-center text-center p-4" style="min-height: 0;">
      <div class="d-flex align-items-center justify-content-center rounded-circle bg-light text-secondary mb-3" style="width: 4.5rem; height: 4.5rem;">
        <i class="fa-solid fa-comments" style="font-size: 1.75rem;"></i>
      </div>
      <h5 class="fw-semibold mb-1">No room selected</h5>
      <p class="text-muted mb-4" style="max-width: 22rem;">
        Pick a room from the sidebar to start chatting, or create a new one to get the conversation going.
      </p>
      <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addRoomModal">
        <i class="fa-solid fa-plus me-1"></i> Add a room
      </button>
    </div>
  </div>
</div>
